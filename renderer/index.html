<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             img-src 'self' https://*.scdn.co https://*.spotifycdn.com https://i.scdn.co;
             style-src 'self' 'unsafe-inline';
             script-src 'self'">
  <title>Spotify Dynamic Island</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="island">

    <!-- ════════════════════════════════════════════════
         COLLAPSED LAYER  (always rendered, fades out on expand)
         ════════════════════════════════════════════════ -->
    <div class="layer-collapsed">
      <div class="waveform" id="waveform">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
      <span class="collapsed-title" id="collapsed-title">Spotify Dynamic Island</span>
    </div>

    <!-- ════════════════════════════════════════════════
         EXPANDED LAYER  (fades in on expand)
         ════════════════════════════════════════════════ -->
    <div class="layer-expanded">

      <!-- ── Player panel ── -->
      <div id="player-panel" class="player-panel">
        <img id="album-art" class="album-art" src="" alt="">

        <div class="player-right">
          <div class="track-meta">
            <div class="track-name"   id="track-name">—</div>
            <div class="artist-name"  id="artist-name">—</div>
          </div>

          <div class="progress-section">
            <div class="progress-track" id="progress-track">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="time-row">
              <span id="time-current">0:00</span>
              <span id="time-total">0:00</span>
            </div>
          </div>

          <div class="controls">
            <!-- Previous -->
            <button class="ctrl-btn" id="btn-prev" title="Previous">
              <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
              </svg>
            </button>

            <!-- Play / Pause -->
            <button class="ctrl-btn play-btn" id="btn-play-pause" title="Play / Pause">
              <svg class="icon-play"  viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                <path d="M8 5v14l11-7z"/>
              </svg>
              <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
              </svg>
            </button>

            <!-- Next -->
            <button class="ctrl-btn" id="btn-next" title="Next">
              <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- ── Setup panel ── -->
      <div id="setup-panel" class="setup-panel hidden">
        <div class="setup-inner">
          <svg class="spotify-logo" viewBox="0 0 24 24" fill="#1DB954" width="30" height="30">
            <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12
              0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141
              -.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6
              11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3
              -3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12
              -1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12
              -3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601
              .18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419
              1.56-.299.421-1.02.599-1.559.3z"/>
          </svg>
          <div class="setup-title">Connect Spotify</div>
          <div class="setup-desc">Enter your Spotify App Client&nbsp;ID to get started</div>
          <input id="client-id-input" class="setup-input" type="text"
                 placeholder="Client ID" spellcheck="false" autocomplete="off">
          <button id="btn-connect" class="setup-btn">Connect</button>
          <button id="btn-dashboard" class="setup-link">Get a Client ID at developer.spotify.com ↗</button>
        </div>
      </div>

    </div><!-- /layer-expanded -->
  </div><!-- /island -->

  <script src="app.js"></script>
</body>
</html>
